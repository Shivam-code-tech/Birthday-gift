<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 80px;
        font-size: 50px;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        font-size: 20px;
        width: 60%;
        margin: auto;
        opacity: 0;
        animation: fadeIn 3s forwards;
        animation-delay: 1.5s;
    }

    button {
        margin-top: 30px;
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff4d6d;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4d6d;
        color: white;
    }

    .hidden {
        display: none;
        margin-top: 20px;
        font-size: 22px;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        bottom: -10px;
        font-size: 20px;
        animation: float 6s infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(0);
            opacity: 1;
        }
        100% {
            transform: translateY(-800px);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<h1>Happy Birthday, <span id="name">Your Special One</span> 🎉</h1>

<p id="message">
    You make my world brighter every day. Today is all about celebrating you, your smile, and everything that makes you amazing 💖
</p>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div id="surprise" class="hidden">
    🎂 I hope all your dreams come true! 💫 <br>
    You deserve the best day ever ❤️
</div>

<script>
    function showSurprise() {
        document.getElementById("surprise").style.display = "block";
    }

    // Floating hearts generator
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
