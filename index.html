<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    overflow-x: hidden;
}

/* Sections (mobile full screen) */
.section {
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 20px;
}

/* Colors */
.section1 { background: linear-gradient(120deg, #667eea, #764ba2); color: white; }
.section2 { background: #ffffff; color: #333; }
.section3 { background: #ffcc00; color: #333; }
.section4 { background: #222; color: white; }

/* Text */
h1 {
    font-size: 2.2em;
    margin-bottom: 10px;
}

p {
    font-size: 16px;
    max-width: 300px;
    line-height: 1.5;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    background: white;
    color: #333;
    cursor: pointer;
}

/* Gallery */
.gallery {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    width: 100%;
    padding: 10px;
}

.gallery img {
    width: 70%;
    border-radius: 15px;
}

/* Surprise */
#surprise {
    display: none;
    margin-top: 15px;
    font-size: 18px;
}

/* Floating balloons */
.balloon {
    position: fixed;
    bottom: -100px;
    font-size: 25px;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    from { transform: translateY(0); }
    to { transform: translateY(-800px); }
}

/* Typing effect */
#typing {
    border-right: 2px solid white;
    padding-right: 5px;
}
</style>
</head>

<body>

<!-- Section 1 -->
<div class="section section1">
    <h1>🎉 Happy Birthday <span id="name">BRO</span> 🎉</h1>
    <p id="typing"></p>
</div>

<!-- Section 2 -->
<div class="section section2">
    <h1>Memories 📸</h1>
    <div class="gallery">
        <img src="https://picsum.photos/300?1">
        <img src="https://picsum.photos/300?2">
        <img src="https://picsum.photos/300?3">
    </div>
</div>

<!-- Section 3 -->
<div class="section section3">
    <h1>Message 💬</h1>
    <p>
        Life’s better with a friend like you.  
        Thanks for all the crazy memories and stupid decisions 😂  
        Stay the same legend always!
    </p>

    <button onclick="showSurprise()">Tap Here 🎁</button>
    <div id="surprise">🍰 Treat pending. Don’t forget 😎</div>
</div>

<!-- Section 4 -->
<div class="section section4">
    <h1>Final Note ❤️</h1>
    <p>Another year, same idiot… but my favorite one 🤝</p>
</div>

<script>
// Typing effect
const text = "Scroll down... something cool is waiting 👇";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

// Surprise
function showSurprise() {
    document.getElementById("surprise").style.display = "block";
}

// Balloons
function createBalloon() {
    const b = document.createElement("div");
    b.classList.add("balloon");
    b.innerHTML = "🎈";
    b.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(b);

    setTimeout(() => b.remove(), 6000);
}
setInterval(createBalloon, 500);
</script>

</body>
</html>
